services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: study_agent
      POSTGRES_USER: study_agent
      POSTGRES_PASSWORD: study_agent
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U study_agent -d study_agent"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
